services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      TZ: ${TZ}

      N8N_BASIC_AUTH_ACTIVE: true
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}

      N8N_SECURE_COOKIE: false

      N8N_HOST: n8n.jzuk.pl
      WEBHOOK_URL: https://n8n.jzuk.pl
      N8N_PROTOCOL: https
      N8N_PORT: 5678
    volumes:
      - /data/n8n:/home/node/.n8n
    networks:
      - cloudflared
networks:
  cloudflared:
    external: true
