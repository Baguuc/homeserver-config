services:
  server:
    image: codeberg.org/forgejo/forgejo:15
    container_name: forgejo
    environment:
      - USER_UID=1002
      - USER_GID=1002
    restart: always
    networks:
      - cloudflared
    volumes:
      - /data/forgejo:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - '3000:3000'
      - '222:22'
networks:
  cloudflared:
    external: true